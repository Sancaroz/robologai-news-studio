services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: robologai
      POSTGRES_USER: robologai
      POSTGRES_PASSWORD: robologai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robologai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://robologai:robologai@db:5432/robologai?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
